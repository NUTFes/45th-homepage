pre-commit:
  piped: true # format → lint order
  jobs:
    - name: format
      run: pnpm exec oxfmt {staged_files}
      glob: "*.{ts,tsx,js,jsx,json,jsonc,json5,yml,yaml,css,scss,less,html,md,mdx,graphql,toml}"
      stage_fixed: true

    - name: lint
      run: pnpm exec oxlint --fix {staged_files}
      glob: "*.{ts,tsx}"
      stage_fixed: true
