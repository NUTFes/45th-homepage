pre-commit:
  piped: true # format → lint order
  jobs:
    - name: format
      run: pnpm exec oxfmt {staged_files}
      glob: "*.{ts,tsx,js,jsx,json,jsonc,json5,yml,yaml,css,scss,less,html,md,mdx,graphql,toml}"
      exclude:
        - "src/payload-types.ts"
        - "src/app/(payload)/admin/importMap.js"
        - "src/migrations/**"
        - "node_modules/**"
        - ".next/**"
        - "pnpm-lock.yaml"
        - "skills-lock.json"
        - ".agent/**"
        - ".cursor/**"
        - ".vscode/**"
      stage_fixed: true

    - name: lint
      run: pnpm exec oxlint --fix {staged_files}
      glob: "*.{ts,tsx}"
      exclude:
        - "src/payload-types.ts"
        - "src/app/(payload)/admin/importMap.js"
        - "src/migrations/**"
      stage_fixed: true
