services:
  payload:
    image: node:24-alpine
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    command: sh -c "corepack enable pnpm && pnpm install && pnpm dev --turbo"
    environment:
      - CI=true
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs-s3:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  seaweedfs-master:
    image: chrislusf/seaweedfs:4.18
    command: "master -mdir=/data -ip=seaweedfs-master -ip.bind=0.0.0.0"
    volumes:
      - seaweedfs-master:/data
    expose:
      - "9333"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:9333/cluster/status > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  seaweedfs-volume:
    image: chrislusf/seaweedfs:4.18
    command: "volume -mserver=seaweedfs-master:9333 -dir=/data -max=0 -ip=seaweedfs-volume -ip.bind=0.0.0.0"
    volumes:
      - seaweedfs-volume:/data
    depends_on:
      seaweedfs-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/status > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  seaweedfs-filer:
    image: chrislusf/seaweedfs:4.18
    command: "filer -master=seaweedfs-master:9333 -ip=seaweedfs-filer -ip.bind=0.0.0.0"
    volumes:
      - seaweedfs-filer:/data
    depends_on:
      seaweedfs-master:
        condition: service_healthy
      seaweedfs-volume:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8888/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  seaweedfs-s3:
    image: chrislusf/seaweedfs:4.18
    command: "s3 -filer=seaweedfs-filer:8888 -ip.bind=0.0.0.0"
    ports:
      - "8333:8333"
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
    depends_on:
      seaweedfs-filer:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -S -O /dev/null http://127.0.0.1:8333/ 2>&1 | grep -Eq 'HTTP/[0-9.]+ (200|403)'",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  node_modules:
  seaweedfs-master:
  seaweedfs-volume:
  seaweedfs-filer:
