name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24.13.0"
  PNPM_VERSION: "10.28.1"

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@8f53b50568e4466f2d92504f349c05b9ffcb8b59 # v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Oxfmt Format
        run: pnpm run fmt

      - name: Commit formatted changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "style: auto format by oxfmt"

      - name: Oxlint Check
        run: pnpm run lint

      - name: TypeScript Check
        run: pnpm exec tsc --noEmit

  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      NO_COLOR: "1"
      FORCE_COLOR: "0"
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"

      - name: Run React Doctor
        id: run_doctor
        run: |
          OUTPUT=$(npx -y react-doctor@latest . --project 45th-homepage --verbose --no-lint --fail-on none 2>&1)
          echo "$OUTPUT"
          SCORE=$(echo "$OUTPUT" | grep -oE '[0-9]+ / 100' | head -1 | grep -oE '^[0-9]+')
          echo "score=${SCORE:-0}" >> "$GITHUB_OUTPUT"

      - name: Comment React Doctor Report
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          SCORE: ${{ steps.run_doctor.outputs.score }}
        with:
          script: |
            const score = parseInt(process.env.SCORE || '0');

            let comment = '## 🩺 React Doctor Report\n\n';

            const getHealthColor = (s) => {
              if (s >= 90) return '🟢';
              if (s >= 70) return '🟠';
              return '🔴';
            };

            comment += `### Health Score: ${getHealthColor(score)} **${score} / 100**\n\n`;

            if (score === 100) {
              comment += '✅ **No issues found! Your codebase is in great health.**\n';
            } else {
              comment += `⚠️ Score is below 100. Check your React code for potential issues.\n`;
              comment += `Run \`npx react-doctor@latest . --project 45th-homepage --verbose\` locally for details.\n`;
            }

            const marker = '<!-- react-doctor-report -->';
            const body = `${marker}\n${comment}`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));

            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, react-doctor]
    env:
      PAYLOAD_SECRET: ci_secret_key
      DATABASE_URL: postgres://postgres:mysecretpassword@localhost:5432/payload
      S3_BUCKET: media
      S3_ENDPOINT: http://localhost:8333
      S3_ACCESS_KEY_ID: ci_access_key
      S3_SECRET_ACCESS_KEY: ci_secret_key
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@8f53b50568e4466f2d92504f349c05b9ffcb8b59 # v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build
        run: pnpm run build
